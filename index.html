<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="中国祈福地图 — 寻找全国最灵验的寺庙，一键搜索城市，精准匹配心愿签文" />
    <meta name="theme-color" content="#111111" />
    <title>中国祈福地图 🏮</title>
    <!-- Google Fonts: 像素字体（首屏必需，同步加载） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <!-- 中文字体 Noto Serif SC（非首屏关键，异步加载避免阻塞渲染） -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet" /></noscript>
    <!-- 高德地图 JS API 2.0 + 安全密钥（通过 .env 注入） -->
    <script>
      window._AMapSecurityConfig = {
        securityJsCode: '%VITE_AMAP_SECURITY_CODE%',
      }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=%VITE_AMAP_KEY%" async></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
